name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master] # Se activa en main o master
  workflow_dispatch: # Permite ejecución manual desde GitHub

# Permisos requeridos para desplegar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite cancelar ejecuciones en progreso si hay múltiples pushes rápidos
concurrency:
  group: 'pages'
  cancel-in-progress: true

# Fuerza el uso de Node.js 24 en las acciones para eliminar advertencias de obsolescencia
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          path: frontend # Subdirectorio donde se encuentra el proyecto Astro
          out-dir: build # Directorio compilado configurado en astro.config.mjs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
